# git-cliff configuration for the Lora workspace.
#
# Parses the Conventional-Commits history (already enforced by commitlint +
# husky) and produces two outputs per release:
#
#   - release-notes.md  — changes for the tag being released (used as the
#                         body of the GitHub Release draft)
#   - CHANGELOG.md      — the full, cumulative changelog across every tag
#
# Both are generated by the `changelog` job in .github/workflows/release.yml
# via `orhun/git-cliff-action`.

[changelog]
header = """
# Changelog

All notable changes to this project are documented here. The format is based
on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and this project
adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
# The body is a Tera template rendered once per version section. The commit
# hashes are linked back to GitHub via `get_env(name="GITHUB_REPO_URL")`; the
# release workflow exports that variable (see .github/workflows/release.yml)
# and the default keeps local `git cliff` runs working too.
body = """
{% set repo_url = get_env(name="GITHUB_REPO_URL", default="https://github.com/loradb/loradb") -%}
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} \
  ([`{{ commit.id | truncate(length=7, end="") }}`]({{ repo_url }}/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}
"""
footer = ""
trim = true
postprocessors = []

[git]
# Parse Conventional-Commits messages.
conventional_commits = true
# Skip commits that don't match Conventional-Commits rather than erroring.
filter_unconventional = true
# Split commits that contain multiple body lines formatted as conventional.
split_commits = false

commit_parsers = [
  { message = "^feat",     group = "Features" },
  { message = "^fix",      group = "Bug fixes" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs",     group = "Documentation" },
  { message = "^test",     group = "Tests" },
  { message = "^build",    group = "Build system" },
  { message = "^ci",       group = "CI/CD" },
  { message = "^chore\\(release\\):", skip = true },
  { message = "^chore",    group = "Maintenance" },
  { message = "^revert",   group = "Reverts" },
  # Breaking changes surface via the footer regardless of type.
  { body = ".*BREAKING CHANGE.*", group = "Breaking changes" },
]

protect_breaking_commits = true
filter_commits = false

# Tag pattern must match the release-workflow glob: vX.Y.Z or vX.Y.Z-<pre>.
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+(-[A-Za-z0-9.-]+)?"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
