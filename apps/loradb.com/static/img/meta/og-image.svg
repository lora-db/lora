<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="LoraDB — embedded graph database with a Cypher-like query engine">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="1" stop-color="#11142b"/>
    </linearGradient>
    <radialGradient id="glowA" cx="230" cy="315" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b6dff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1b6dff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="980" cy="500" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6e5afd" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6e5afd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="markGrad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4d8dff"/>
      <stop offset="1" stop-color="#8a74ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4d8dff"/>
      <stop offset="1" stop-color="#8a74ff"/>
    </linearGradient>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 210 H1200"/>
    <path d="M0 420 H1200"/>
    <path d="M300 0 V630"/>
    <path d="M600 0 V630"/>
    <path d="M900 0 V630"/>
  </g>

  <!-- Original mark, scaled ~7x (168px nominal, 24-unit viewBox) -->
  <g transform="translate(96 72) scale(7)">
    <g fill="none" stroke="url(#markGrad)" stroke-width="1.4" stroke-linecap="round">
      <path d="M4 6 12 13"/>
      <path d="M12 4 12 13"/>
      <path d="M20 8 12 13"/>
      <path d="M6 18 12 13"/>
      <path d="M18 20 12 13"/>
      <path d="M4 6 12 4"/>
      <path d="M12 4 20 8"/>
      <path d="M6 18 18 20"/>
    </g>
    <g fill="url(#markGrad)">
      <circle cx="4" cy="6" r="1.8"/>
      <circle cx="12" cy="4" r="1.8"/>
      <circle cx="20" cy="8" r="1.8"/>
      <circle cx="6" cy="18" r="1.8"/>
      <circle cx="18" cy="20" r="1.8"/>
      <circle cx="12" cy="13" r="2.8"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="290" y="190"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="700"
        font-size="76"
        letter-spacing="-2"
        fill="#ffffff">LoraDB</text>

  <!-- Headline -->
  <text x="96" y="360"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="700"
        font-size="66"
        letter-spacing="-1.5"
        fill="#ffffff">The graph database for</text>
  <text x="96" y="440"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="700"
        font-size="66"
        letter-spacing="-1.5"
        fill="url(#accent)">connected systems.</text>

  <!-- Subline -->
  <text x="96" y="506"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500"
        font-size="28"
        fill="#b7c0d9">Embedded · Rust-native · Cypher-like query engine</text>

  <!-- Footer row -->
  <g transform="translate(96 570)">
    <circle cx="6" cy="0" r="6" fill="url(#accent)"/>
    <text x="26" y="7"
          font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-weight="500"
          font-size="22"
          fill="#8d97b5">loradb.com</text>
    <text x="1104" y="7" text-anchor="end"
          font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-weight="500"
          font-size="22"
          fill="#8d97b5">Node.js · Python · WASM</text>
  </g>
</svg>
