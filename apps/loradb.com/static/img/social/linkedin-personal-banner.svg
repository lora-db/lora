<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" role="img" aria-label="LoraDB on LinkedIn">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1584" y2="396" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="1" stop-color="#11142b"/>
    </linearGradient>
    <radialGradient id="glowA" cx="260" cy="200" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b6dff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1b6dff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="1280" cy="320" r="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6e5afd" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6e5afd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="markGrad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4d8dff"/>
      <stop offset="1" stop-color="#8a74ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4d8dff"/>
      <stop offset="1" stop-color="#8a74ff"/>
    </linearGradient>
  </defs>

  <rect width="1584" height="396" fill="url(#bg)"/>
  <rect width="1584" height="396" fill="url(#glowA)"/>
  <rect width="1584" height="396" fill="url(#glowB)"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 132 H1584"/>
    <path d="M0 264 H1584"/>
  </g>

  <!-- Content shifted right so the profile circle (~220px bottom-left) doesn't clash. -->
  <text x="560" y="160"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="700"
        font-size="72"
        letter-spacing="-2"
        fill="#ffffff">LoraDB</text>

  <text x="560" y="220"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500"
        font-size="28"
        fill="url(#accent)">Embedded · Rust-native · Cypher-like</text>

  <text x="560" y="270"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500"
        font-size="26"
        fill="#b7c0d9">The graph database for connected systems.</text>
</svg>
