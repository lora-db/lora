<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="LoraDB on Discord">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="1" stop-color="#11142b"/>
    </linearGradient>
    <radialGradient id="glowA" cx="200" cy="280" r="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b6dff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1b6dff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="780" cy="440" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6e5afd" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6e5afd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="markGrad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4d8dff"/>
      <stop offset="1" stop-color="#8a74ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4d8dff"/>
      <stop offset="1" stop-color="#8a74ff"/>
    </linearGradient>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <rect width="960" height="540" fill="url(#glowA)"/>
  <rect width="960" height="540" fill="url(#glowB)"/>

  <!-- Mark centered -->
  <g transform="translate(360 110) scale(10)">
    <g fill="none" stroke="url(#markGrad)" stroke-width="1.4" stroke-linecap="round">
      <path d="M4 6 12 13"/>
      <path d="M12 4 12 13"/>
      <path d="M20 8 12 13"/>
      <path d="M6 18 12 13"/>
      <path d="M18 20 12 13"/>
      <path d="M4 6 12 4"/>
      <path d="M12 4 20 8"/>
      <path d="M6 18 18 20"/>
    </g>
    <g fill="url(#markGrad)">
      <circle cx="4" cy="6" r="1.8"/>
      <circle cx="12" cy="4" r="1.8"/>
      <circle cx="20" cy="8" r="1.8"/>
      <circle cx="6" cy="18" r="1.8"/>
      <circle cx="18" cy="20" r="1.8"/>
      <circle cx="12" cy="13" r="2.8"/>
    </g>
  </g>

  <text x="480" y="400" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="700"
        font-size="64"
        letter-spacing="-1.5"
        fill="#ffffff">LoraDB</text>

  <text x="480" y="450" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500"
        font-size="24"
        fill="url(#accent)">Embedded · Rust-native · Cypher-like</text>

  <text x="480" y="490" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500"
        font-size="22"
        fill="#b7c0d9">The graph database for connected systems.</text>
</svg>
