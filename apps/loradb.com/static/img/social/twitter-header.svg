<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" role="img" aria-label="LoraDB on X">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="1" stop-color="#11142b"/>
    </linearGradient>
    <radialGradient id="glowA" cx="1150" cy="180" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b6dff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1b6dff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="1280" cy="420" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6e5afd" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6e5afd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="markGrad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4d8dff"/>
      <stop offset="1" stop-color="#8a74ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4d8dff"/>
      <stop offset="1" stop-color="#8a74ff"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#glowA)"/>
  <rect width="1500" height="500" fill="url(#glowB)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 166 H1500"/>
    <path d="M0 334 H1500"/>
    <path d="M500 0 V500"/>
    <path d="M1000 0 V500"/>
  </g>

  <!-- Content lives in the right half so the profile avatar (bottom-left ~400x400) doesn't overlap. -->
  <!-- Mark on the right -->
  <g transform="translate(560 110) scale(6.5)">
    <g fill="none" stroke="url(#markGrad)" stroke-width="1.4" stroke-linecap="round">
      <path d="M4 6 12 13"/>
      <path d="M12 4 12 13"/>
      <path d="M20 8 12 13"/>
      <path d="M6 18 12 13"/>
      <path d="M18 20 12 13"/>
      <path d="M4 6 12 4"/>
      <path d="M12 4 20 8"/>
      <path d="M6 18 18 20"/>
    </g>
    <g fill="url(#markGrad)">
      <circle cx="4" cy="6" r="1.8"/>
      <circle cx="12" cy="4" r="1.8"/>
      <circle cx="20" cy="8" r="1.8"/>
      <circle cx="6" cy="18" r="1.8"/>
      <circle cx="18" cy="20" r="1.8"/>
      <circle cx="12" cy="13" r="2.8"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="760" y="200"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="700"
        font-size="76"
        letter-spacing="-2"
        fill="#ffffff">LoraDB</text>

  <!-- Headline -->
  <text x="760" y="270"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500"
        font-size="30"
        fill="url(#accent)">Embedded · Rust-native · Cypher-like</text>

  <text x="760" y="340"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500"
        font-size="28"
        fill="#b7c0d9">The graph database for connected systems.</text>
</svg>
