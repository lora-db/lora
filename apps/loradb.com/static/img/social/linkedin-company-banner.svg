<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" role="img" aria-label="LoraDB on LinkedIn">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1128" y2="191" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="1" stop-color="#11142b"/>
    </linearGradient>
    <radialGradient id="glowA" cx="240" cy="95" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b6dff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1b6dff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="900" cy="150" r="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6e5afd" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6e5afd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="markGrad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4d8dff"/>
      <stop offset="1" stop-color="#8a74ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4d8dff"/>
      <stop offset="1" stop-color="#8a74ff"/>
    </linearGradient>
  </defs>

  <rect width="1128" height="191" fill="url(#bg)"/>
  <rect width="1128" height="191" fill="url(#glowA)"/>
  <rect width="1128" height="191" fill="url(#glowB)"/>

  <!-- Wordmark -->
  <text x="64" y="88"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="700"
        font-size="40"
        letter-spacing="-1"
        fill="#ffffff">LoraDB</text>

  <text x="64" y="128"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500"
        font-size="20"
        fill="url(#accent)">Embedded · Rust-native · Cypher-like</text>

  <text x="1064" y="100" text-anchor="end"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500"
        font-size="20"
        fill="#b7c0d9">loradb.com</text>
</svg>
