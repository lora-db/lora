---
grammar:
  BNFdef:
    - rhs:
        alt:
          - BNF:
              _name: program activity
            opt:
              BNF:
                _name: session close command
          - BNF:
              _name: session close command
      _name: GQL-program
      _predicative: 'no'
    - rhs:
        alt:
          - BNF:
              _name: session activity
          - BNF:
              _name: transaction activity
      _name: program activity
      _predicative: 'no'
    - rhs:
        alt:
          - BNF:
              _name: session reset command
            repeat: ''
          - BNF:
              _name: session set command
            repeat: ''
            opt:
              BNF:
                _name: session reset command
              repeat: ''
      _name: session activity
      _predicative: 'no'
    - rhs:
        alt:
          - BNF:
              _name: start transaction command
            opt:
              BNF:
                _name: procedure specification
              opt:
                BNF:
                  _name: end transaction command
          - BNF:
              _name: procedure specification
            opt:
              BNF:
                _name: end transaction command
          - BNF:
              _name: end transaction command
      _name: transaction activity
      _predicative: 'no'
    - rhs:
        alt:
          - BNF:
              _name: rollback command
          - BNF:
              _name: commit command
      _name: end transaction command
      _predicative: 'no'
    - rhs:
        kw:
          - SESSION
          - SET
        group:
          alt:
            - BNF:
                _name: session set schema clause
            - BNF:
                _name: session set graph clause
            - BNF:
                _name: session set time zone clause
            - BNF:
                _name: session set parameter clause
      _name: session set command
      _predicative: 'no'
    - rhs:
        kw: SCHEMA
        BNF:
          _name: schema reference
      _name: session set schema clause
      _predicative: 'no'
    - rhs:
        opt:
          kw: PROPERTY
        kw: GRAPH
        BNF:
          _name: graph expression
      _name: session set graph clause
      _predicative: 'no'
    - rhs:
        kw:
          - TIME
          - ZONE
        BNF:
          _name: set time zone value
      _name: session set time zone clause
      _predicative: 'no'
    - rhs:
        BNF:
          _name: time zone string
      _name: set time zone value
      _predicative: 'no'
    - rhs:
        alt:
          - BNF:
              _name: session set graph parameter clause
          - BNF:
              _name: session set binding table parameter clause
          - BNF:
              _name: session set value parameter clause
      _name: session set parameter clause
      _predicative: 'no'
    - rhs:
        opt:
          kw: PROPERTY
        kw: GRAPH
        BNF:
          - _name: session set parameter name
          - _name: opt typed graph initializer
      _name: session set graph parameter clause
      _predicative: 'no'
    - rhs:
        opt:
          kw: BINDING
        kw: TABLE
        BNF:
          - _name: session set parameter name
          - _name: opt typed binding table initializer
      _name: session set binding table parameter clause
      _predicative: 'no'
    - rhs:
        kw: VALUE
        BNF:
          - _name: session set parameter name
          - _name: opt typed value initializer
      _name: session set value parameter clause
      _predicative: 'no'
    - rhs:
        opt:
          kw:
            - IF
            - NOT
            - EXISTS
        BNF:
          _name: session parameter specification
      _name: session set parameter name
      _predicative: 'no'
    - rhs:
        kw:
          - SESSION
          - RESET
        opt:
          BNF:
            _name: session reset arguments
      _name: session reset command
      _predicative: 'no'
    - rhs:
        alt:
          - opt:
              kw: ALL
            group:
              alt:
                - kw: PARAMETERS
                - kw: CHARACTERISTICS
          - kw: SCHEMA
          - opt:
              kw: PROPERTY
            kw: GRAPH
          - kw:
              - TIME
              - ZONE
          - opt:
              kw: PARAMETER
            BNF:
              _name: session parameter specification
      _name: session reset arguments
      _predicative: 'no'
    - rhs:
        kw:
          - SESSION
          - CLOSE
      _name: session close command
      _predicative: 'no'
    - rhs:
        BNF:
          _name: general parameter reference
      _name: session parameter specification
      _predicative: 'no'
    - rhs:
        kw:
          - START
          - TRANSACTION
        opt:
          BNF:
            _name: transaction characteristics
      _name: start transaction command
      _predicative: 'no'
    - rhs:
        BNF:
          _name: transaction mode
        opt:
          group:
            BNF:
              - _name: comma
              - _name: transaction mode
          repeat: ''
      _name: transaction characteristics
      _predicative: 'no'
    - rhs:
        alt:
          - BNF:
              _name: transaction access mode
          - BNF:
              _name: implementation-defined access mode
      _name: transaction mode
      _predicative: 'no'
    - rhs:
        alt:
          - kw:
              - READ
              - ONLY
          - kw:
              - READ
              - WRITE
      _name: transaction access mode
      _predicative: 'no'
    - rhs:
        seeTheRules: ''
      _name: implementation-defined access mode
      _predicative: 'no'
    - rhs:
        kw: ROLLBACK
      _name: rollback command
      _predicative: 'no'
    - rhs:
        kw: COMMIT
      _name: commit command
      _predicative: 'no'
    - rhs:
        BNF:
          - _name: left brace
          - _name: procedure specification
          - _name: right brace
      _name: nested procedure specification
      _predicative: 'no'
    - rhs:
        alt:
          - BNF:
              _name: catalog-modifying procedure specification
          - BNF:
              _name: data-modifying procedure specification
          - BNF:
              _name: query specification
      _name: procedure specification
      _predicative: 'no'
    - rhs:
        BNF:
          _name: procedure body
      _name: catalog-modifying procedure specification
      _predicative: 'no'
    - rhs:
        BNF:
          - _name: left brace
          - _name: data-modifying procedure specification
          - _name: right brace
      _name: nested data-modifying procedure specification
      _predicative: 'no'
    - rhs:
        BNF:
          _name: procedure body
      _name: data-modifying procedure specification
      _predicative: 'no'
    - rhs:
        BNF:
          - _name: left brace
          - _name: query specification
          - _name: right brace
      _name: nested query specification
      _predicative: 'no'
    - rhs:
        BNF:
          _name: procedure body
      _name: query specification
      _predicative: 'no'
    - rhs:
        opt:
          - BNF:
              _name: at schema clause
          - BNF:
              _name: binding variable definition block
        BNF:
          _name: statement block
      _name: procedure body
      _predicative: 'no'
    - rhs:
        BNF:
          _name: binding variable definition
        repeat: ''
      _name: binding variable definition block
      _predicative: 'no'
    - rhs:
        alt:
          - BNF:
              _name: graph variable definition
          - BNF:
              _name: binding table variable definition
          - BNF:
              _name: value variable definition
      _name: binding variable definition
      _predicative: 'no'
    - rhs:
        BNF:
          _name: statement
        opt:
          BNF:
            _name: next statement
          repeat: ''
      _name: statement block
      _predicative: 'no'
    - rhs:
        alt:
          - BNF:
              _name: linear catalog-modifying statement
          - BNF:
              _name: linear data-modifying statement
          - BNF:
              _name: composite query statement
      _name: statement
