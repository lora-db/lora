    - rhs:
        opt:
          opt:
            BNF:
              _name: typed
          BNF:
            _name: binding table reference value type
        BNF:
          _name: binding table initializer
      _name: opt typed binding table initializer
      _predicative: 'no'
    - rhs:
        BNF:
          - _name: equals operator
          - _name: binding table expression
      _name: binding table initializer
      _predicative: 'no'
    - rhs:
        kw: VALUE
        BNF:
          - _name: binding variable
          - _name: opt typed value initializer
      _name: value variable definition
      _predicative: 'no'
    - rhs:
        opt:
          opt:
            BNF:
              _name: typed
          BNF:
            _name: value type
        BNF:
          _name: value initializer
      _name: opt typed value initializer
      _predicative: 'no'
    - rhs:
        BNF:
          - _name: equals operator
          - _name: value expression
      _name: value initializer
