name: lora-node

on:
  push:
    branches: [main]
    paths:
      - "crates/bindings/lora-node/**"
      - "crates/bindings/lora-binding-buffer/**"
      - "crates/lora-ast/**"
      - "crates/lora-parser/**"
      - "crates/lora-analyzer/**"
      - "crates/lora-compiler/**"
      - "crates/lora-executor/**"
      - "crates/lora-store/**"
      - "crates/lora-database/**"
      - "crates/bindings/shared-ts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/actions/setup-rust/**"
      - ".github/workflows/lora-node.yml"
  pull_request:
    paths:
      - "crates/bindings/lora-node/**"
      - "crates/bindings/lora-binding-buffer/**"
      - "crates/lora-ast/**"
      - "crates/lora-parser/**"
      - "crates/lora-analyzer/**"
      - "crates/lora-compiler/**"
      - "crates/lora-executor/**"
      - "crates/lora-store/**"
      - "crates/lora-database/**"
      - "crates/bindings/shared-ts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/actions/setup-rust/**"
      - ".github/workflows/lora-node.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: crates/bindings/lora-node

jobs:
  verify:
    name: build, typecheck, test, npm pack (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: lora-node-${{ matrix.os }}

      - name: Enable corepack (yarn v4)
        working-directory: .
        run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "yarn"

      - name: cargo check
        working-directory: .
        run: cargo check -p lora-node --locked

      - name: yarn install (immutable)
        working-directory: .
        run: yarn install --immutable

      - name: verify shared TS types are in sync
        run: yarn run verify:types

      - name: build native (napi)
        run: yarn run build:native

      - name: build TS
        run: yarn run build:ts

      - name: typecheck
        run: yarn run typecheck

      - name: vitest (includes non-blocking event-loop test)
        run: yarn run test

      - name: npm pack (dry-run)
        run: npm pack --dry-run

      - name: npm pack
        run: npm pack

      - uses: actions/upload-artifact@v5
        with:
          name: lora-node-${{ matrix.os }}-tarball
          path: crates/bindings/lora-node/loradb-lora-node-*.tgz
          if-no-files-found: error
          retention-days: 7
