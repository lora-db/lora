name: commitlint

# Conventional-Commits gate for PRs (title + every commit in the range)
# and for pushes to main (the last commit on main). See CONTRIBUTING.md
# for the allowed types/scopes — they come from commitlint.config.cjs.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  commitlint:
    name: Validate conventional commits
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install commitlint
        run: npm install --no-save --no-audit --no-fund @commitlint/cli@^19.5.0 @commitlint/config-conventional@^19.5.0

      - name: Validate PR commits
        if: github.event_name == 'pull_request'
        run: npx commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }} --verbose

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | npx commitlint --verbose

      - name: Validate latest commit on push
        if: github.event_name == 'push'
        run: npx commitlint --from=HEAD~1 --to=HEAD --verbose
