name: lora-server

on:
  push:
    branches: [main]
    paths:
      - "crates/lora-server/**"
      - "crates/lora-database/**"
      - "crates/lora-store/**"
      - "crates/lora-executor/**"
      - "crates/lora-compiler/**"
      - "crates/lora-analyzer/**"
      - "crates/lora-parser/**"
      - "crates/lora-ast/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/actions/setup-rust/**"
      - ".github/workflows/lora-server.yml"
  pull_request:
    paths:
      - "crates/lora-server/**"
      - "crates/lora-database/**"
      - "crates/lora-store/**"
      - "crates/lora-executor/**"
      - "crates/lora-compiler/**"
      - "crates/lora-analyzer/**"
      - "crates/lora-parser/**"
      - "crates/lora-ast/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/actions/setup-rust/**"
      - ".github/workflows/lora-server.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: check, test, release build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: lora-server-${{ matrix.os }}

      - name: cargo check (lora-server)
        run: cargo check -p lora-server --locked

      - name: cargo test (lora-server)
        run: cargo test -p lora-server --locked

      - name: cargo build --release (lora-server)
        run: cargo build --release --locked -p lora-server --bin lora-server

      - name: Upload CI release-profile binary (not a release asset)
        uses: actions/upload-artifact@v5
        with:
          name: lora-server-${{ matrix.os }}-ci-build
          path: |
            target/release/lora-server
            target/release/lora-server.exe
          if-no-files-found: error
          retention-days: 7
