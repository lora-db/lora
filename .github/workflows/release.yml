name: release

# Release build + publish for the `lora-server` binary.
#
# Triggers:
#   - Pushing a semver tag of the form `vX.Y.Z` (optionally with a pre-release
#     suffix, e.g. `v0.2.0-rc.1`). The tag SHA is the commit that gets built.
#   - Manual dispatch: run the workflow against an existing tag to rebuild or
#     recover from a failed release without re-tagging.
#
# Flow:
#   1. `build` runs in parallel across every target in the matrix. Each job
#      produces a per-target archive + SHA-256 checksum and uploads both as
#      workflow artifacts (these are the recovery/backup copy).
#   2. `changelog` runs in parallel with `build`. It uses git-cliff (configured
#      in `cliff.toml`) to render:
#        - `release-notes.md` — Conventional-Commits-derived notes for the
#          current tag (used as the body of the GitHub Release);
#        - `CHANGELOG.md`     — full cumulative changelog across every tag
#          (attached as a release asset).
#   3. `publish` runs once after every `build` leg and `changelog` have
#      finished. It downloads all artifacts, creates (or updates) a DRAFT
#      GitHub Release for the tag using the rendered release notes as the body,
#      and attaches every binary archive + checksums + full `CHANGELOG.md`.
#      The draft must be published manually.
#   4. Tags containing a hyphen (e.g. `v0.2.0-rc.1`) are marked as pre-release.
#
# Benchmarks intentionally live in a separate workflow so release publication
# is never blocked by CI benchmark noise, runner variance, or longer benchmark
# runtimes.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.1.0)."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify-versions:
    name: verify tag matches manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      prerelease: ${{ steps.tag.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/resolve-release-tag
        id: tag
        with:
          tag: ${{ inputs.tag }}

      - name: Verify all manifests match ${{ steps.tag.outputs.version }}
        run: node scripts/sync-versions.mjs "${{ steps.tag.outputs.version }}" --check

  build:
    name: build ${{ matrix.target }}
    needs: verify-versions
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive-ext: tar.gz
            bin-ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive-ext: zip
            bin-ext: ".exe"
          - os: macos-latest
            target: x86_64-apple-darwin
            archive-ext: tar.gz
            bin-ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            archive-ext: tar.gz
            bin-ext: ""
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: release-${{ matrix.target }}
          targets: ${{ matrix.target }}

      - name: Derive artifact + archive names
        id: names
        shell: bash
        env:
          TAG: ${{ needs.verify-versions.outputs.tag }}
          TARGET: ${{ matrix.target }}
          ARCHIVE_EXT: ${{ matrix.archive-ext }}
        run: |
          artifact="lora-server-${TAG}-${TARGET}"
          echo "artifact=${artifact}" >> "$GITHUB_OUTPUT"
          echo "archive=${artifact}.${ARCHIVE_EXT}" >> "$GITHUB_OUTPUT"

      - name: Build lora-server (release)
        run: cargo build --release --locked -p lora-server --bin lora-server --target ${{ matrix.target }}

      - name: Stage artifact contents
        id: stage
        shell: bash
        env:
          STAGING: ${{ steps.names.outputs.artifact }}
          TARGET: ${{ matrix.target }}
          BIN_EXT: ${{ matrix.bin-ext }}
        run: |
          mkdir -p "$STAGING"
          cp "target/${TARGET}/release/lora-server${BIN_EXT}" "$STAGING/"
          cp README.md "$STAGING/"
          cp RELEASING.md "$STAGING/"
          echo "dir=${STAGING}" >> "$GITHUB_OUTPUT"

      - name: Package (zip, Windows)
        if: matrix.archive-ext == 'zip'
        shell: pwsh
        run: |
          $archive = "${{ steps.names.outputs.archive }}"
          $staging = "${{ steps.stage.outputs.dir }}"
          Compress-Archive -Path $staging -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ascii -NoNewline "$archive.sha256"

      - name: Package (tar.gz, unix)
        if: matrix.archive-ext == 'tar.gz'
        shell: bash
        env:
          ARCHIVE: ${{ steps.names.outputs.archive }}
          STAGING: ${{ steps.stage.outputs.dir }}
        run: |
          tar -czf "$ARCHIVE" "$STAGING"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ steps.names.outputs.archive }}
            ${{ steps.names.outputs.archive }}.sha256
          if-no-files-found: error
          retention-days: 30

  changelog:
    name: generate changelog
    needs: verify-versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Render release notes (current tag only)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: release-notes.md
          GITHUB_REPO_URL: https://github.com/${{ github.repository }}

      - name: Render full CHANGELOG.md (all tags)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: ""
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO_URL: https://github.com/${{ github.repository }}

      - name: Sanity-check generated files
        shell: bash
        run: |
          test -s release-notes.md || { echo "::error::release-notes.md is empty"; exit 1; }
          test -s CHANGELOG.md     || { echo "::error::CHANGELOG.md is empty";     exit 1; }

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-changelog
          path: |
            release-notes.md
            CHANGELOG.md
          if-no-files-found: error
          retention-days: 30

  publish:
    name: publish GitHub Release
    needs: [verify-versions, build, changelog]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: List collected assets
        shell: bash
        run: ls -lh dist

      - name: Aggregate SHA-256 checksums
        shell: bash
        env:
          TAG: ${{ needs.verify-versions.outputs.tag }}
        run: |
          cd dist
          cat *.sha256 > "lora-server-${TAG}-SHA256SUMS.txt"

      - name: Compose release body
        id: body
        shell: bash
        env:
          TAG: ${{ needs.verify-versions.outputs.tag }}
        run: |
          notes="dist/release-notes.md"
          body="RELEASE_BODY.md"
          {
            if [ -s "$notes" ]; then
              cat "$notes"
              echo
              echo "---"
              echo
            else
              echo "## lora-server ${TAG}"
              echo
              echo "_(no conventional-commits changes detected for this tag)_"
              echo
            fi
            echo "### Assets"
            echo
            echo "| Platform            | Asset |"
            echo "| ------------------- | ----- |"
            echo "| Linux x86_64        | \`lora-server-${TAG}-x86_64-unknown-linux-gnu.tar.gz\` |"
            echo "| Windows x86_64      | \`lora-server-${TAG}-x86_64-pc-windows-msvc.zip\` |"
            echo "| macOS Intel         | \`lora-server-${TAG}-x86_64-apple-darwin.tar.gz\` |"
            echo "| macOS Apple Silicon | \`lora-server-${TAG}-aarch64-apple-darwin.tar.gz\` |"
            echo "| Full changelog      | \`CHANGELOG.md\` |"
            echo
            echo "Each binary archive ships with a matching \`.sha256\` file. An aggregated \`lora-server-${TAG}-SHA256SUMS.txt\` is also attached."
            echo
            echo "Download, verify, and run instructions: see [RELEASING.md](https://github.com/${GITHUB_REPOSITORY}/blob/${TAG}/RELEASING.md) and the README."
          } > "$body"
          echo "path=${body}" >> "$GITHUB_OUTPUT"

      - name: Publish draft GitHub Release with all assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-versions.outputs.tag }}
          name: ${{ needs.verify-versions.outputs.tag }}
          body_path: ${{ steps.body.outputs.path }}
          draft: true
          prerelease: ${{ needs.verify-versions.outputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            dist/lora-server-${{ needs.verify-versions.outputs.tag }}-*.tar.gz
            dist/lora-server-${{ needs.verify-versions.outputs.tag }}-*.tar.gz.sha256
            dist/lora-server-${{ needs.verify-versions.outputs.tag }}-*.zip
            dist/lora-server-${{ needs.verify-versions.outputs.tag }}-*.zip.sha256
            dist/lora-server-${{ needs.verify-versions.outputs.tag }}-SHA256SUMS.txt
            dist/CHANGELOG.md
