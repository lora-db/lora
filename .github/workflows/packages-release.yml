name: packages-release

# Tag-driven client-package release pipeline. Covers four distributable
# packages plus a verify-only path for the Go binding:
#   - @loradb/lora-wasm  → npm
#   - @loradb/lora-node  → npm (root + per-triple optional subpackages)
#   - lora-python        → PyPI (manylinux + macOS + Windows wheels + sdist)
#   - lora-ruby          → RubyGems (source gem + precompiled platform gems)
#   - lora-go            → no registry upload. Go resolves the module via
#                          the git tag + proxy.golang.org. This workflow
#                          only (1) verifies the tagged tree builds + tests,
#                          (2) packages a convenience liblora_ffi archive,
#                          (3) confirms the Go module proxy has indexed
#                          the tag (real tag pushes only).
#
# Triggers:
#   - `git push origin vX.Y.Z`  (or `vX.Y.Z-rc.1` etc.) starts the full flow.
#   - Manual dispatch lets you rebuild an existing tag (recovery) or
#     rehearse the entire pipeline with `dry_run: true`, which builds
#     and packs everything but skips the actual publish.
#
# Artifacts from every build leg are uploaded before any publish job runs,
# so a failed publish can be inspected or re-driven from the tag without
# re-tagging. The lora-server binary release (release.yml) is intentionally
# separate — that workflow creates a draft GitHub Release; this one pushes
# to npm, PyPI, and RubyGems, which have no draft concept.
#
# Trusted publishing (OIDC) is preferred for all three registries:
#   - npm:       configure a trusted publisher on npmjs.com for each package,
#                bound to GitHub environment `npm-publish`.
#   - PyPI:      configure a trusted publisher at pypi.org, bound to GitHub
#                environment `pypi-publish`.
#   - RubyGems:  configure a trusted publisher at rubygems.org, bound to
#                GitHub environment `rubygems-publish`. Uses the
#                `rubygems/configure-rubygems-credentials` + `release-gem`
#                actions, which negotiate an OIDC token with rubygems.org.
# If trusted publishing is unavailable (e.g. first-ever publish of a new
# package name), the workflow falls back to `NPM_TOKEN` / `PYPI_API_TOKEN` /
# `RUBYGEMS_API_KEY` secrets when present. See RELEASING.md for the exact
# setup.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.1.0)."
        required: true
        type: string
      dry_run:
        description: "Build+pack only. Skip all publish steps."
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: packages-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  # `dry_run` only exists on workflow_dispatch. On a tag push the input is
  # empty, which we want to mean "do publish". Normalise that here so
  # every downstream `if:` can just compare to 'true'.
  DRY_RUN: ${{ inputs.dry_run || 'false' }}

jobs:
  verify-versions:
    name: verify tag matches manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      prerelease: ${{ steps.tag.outputs.prerelease }}
      dry_run: ${{ env.DRY_RUN }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/resolve-release-tag
        id: tag
        with:
          tag: ${{ inputs.tag }}

      - name: Verify all manifests match ${{ steps.tag.outputs.version }}
        run: node scripts/sync-versions.mjs "${{ steps.tag.outputs.version }}" --check

  # ──────────────────────────────────────────────────────────────────────
  # @loradb/lora-wasm
  # Single tarball that ships dist/ + pkg-node/ + pkg-bundler/ + pkg-web/.
  # ──────────────────────────────────────────────────────────────────────

  build-wasm:
    name: build @loradb/lora-wasm
    needs: verify-versions
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: crates/lora-wasm
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: lora-wasm-release-ubuntu
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.14.0"

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crates/lora-wasm/package-lock.json

      - name: npm install
        run: npm ci --no-audit --no-fund --ignore-scripts

      - uses: ./.github/actions/copy-license
        with:
          destination: crates/lora-wasm

      - name: Build (WASM + TS)
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: npm pack (dry-run, inspection)
        run: npm pack --dry-run

      - name: npm pack (produce tarball)
        run: npm pack

      - name: Stage tarball at workspace root for clean artifact layout
        run: mv loradb-lora-wasm-*.tgz ../../

      - uses: actions/upload-artifact@v5
        with:
          name: lora-wasm-tarball
          path: loradb-lora-wasm-*.tgz
          if-no-files-found: error
          retention-days: 30

  publish-wasm:
    name: publish @loradb/lora-wasm
    needs: [verify-versions, build-wasm]
    if: needs.verify-versions.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: crates/lora-wasm
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: lora-wasm-release-ubuntu
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.14.0"

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crates/lora-wasm/package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: Update npm to a version that supports --provenance (>=9.5)
        run: npm install -g npm@latest

      - name: npm install
        run: npm ci --no-audit --no-fund --ignore-scripts

      - uses: ./.github/actions/copy-license
        with:
          destination: crates/lora-wasm

      - name: Build (WASM + TS)
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public --ignore-scripts
        env:
          # Populated when trusted publishing is NOT yet configured.
          # With trusted publishing live, this is empty and npm falls back
          # to the GitHub OIDC token automatically.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────
  # @loradb/lora-node
  # One root package (JS + TS + loader) plus one platform subpackage per
  # napi triple. Native binaries are built in parallel matrix jobs and
  # assembled in the publish job using napi-rs' create-npm-dir / artifacts
  # commands.
  # ──────────────────────────────────────────────────────────────────────

  build-node:
    name: build lora-node ${{ matrix.triple }}
    needs: verify-versions
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            triple: linux-x64-gnu
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            triple: linux-arm64-gnu
            cross: zig
          - os: macos-latest
            target: x86_64-apple-darwin
            triple: darwin-x64
            cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            triple: darwin-arm64
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            triple: win32-x64-msvc
            cross: false
    defaults:
      run:
        working-directory: crates/lora-node
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: lora-node-release-${{ matrix.triple }}
          targets: ${{ matrix.target }}

      - name: Install zig for linux-arm64 cross-compile
        if: matrix.cross == 'zig'
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.13.0"

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crates/lora-node/package-lock.json

      - name: npm install
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Verify shared TS types are in sync
        run: npm run verify:types

      - uses: ./.github/actions/copy-license
        with:
          destination: crates/lora-node

      - name: Build native for target ${{ matrix.target }} (zig=${{ matrix.cross == 'zig' }})
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ZIG: ${{ matrix.cross == 'zig' && '--zig' || '' }}
        run: |
          npx napi build --platform --release --js false --target "$TARGET" $ZIG

      - name: Verify the expected .node file exists
        shell: bash
        env:
          TRIPLE: ${{ matrix.triple }}
        run: |
          if [ ! -f "lora-node.${TRIPLE}.node" ]; then
            echo "::error::expected lora-node.${TRIPLE}.node" >&2
            ls -la *.node || true
            exit 1
          fi

      - name: Stage binary at workspace root for clean artifact layout
        shell: bash
        env:
          TRIPLE: ${{ matrix.triple }}
        run: mv "lora-node.${TRIPLE}.node" ../../

      - uses: actions/upload-artifact@v5
        with:
          name: lora-node-binary-${{ matrix.triple }}
          path: lora-node.${{ matrix.triple }}.node
          if-no-files-found: error
          retention-days: 30

  publish-node:
    name: publish @loradb/lora-node
    needs: [verify-versions, build-node]
    if: needs.verify-versions.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: crates/lora-node
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crates/lora-node/package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: Update npm to a version that supports --provenance (>=9.5)
        run: npm install -g npm@latest

      - name: npm install (@napi-rs/cli + tsc are needed below)
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Sync + typecheck + build TS (the root package's dist/)
        run: |
          npm run sync:types
          npm run typecheck
          npm run build:ts

      - uses: ./.github/actions/copy-license
        with:
          destination: crates/lora-node

      - name: Download every per-triple native artifact
        uses: actions/download-artifact@v4
        with:
          pattern: lora-node-binary-*
          path: crates/lora-node/artifacts
          merge-multiple: true

      - name: Show collected .node files
        run: ls -la artifacts

      - name: Create per-triple npm subpackage scaffolds
        run: npx napi create-npm-dir -t .

      - name: Move .node binaries into subpackage dirs
        run: npx napi artifacts --dir artifacts --dist npm

      - name: Verify every triple subpackage now has its binary
        shell: bash
        run: |
          set -euo pipefail
          expected="linux-x64-gnu linux-arm64-gnu darwin-x64 darwin-arm64 win32-x64-msvc"
          missing=0
          for triple in $expected; do
            bin="npm/${triple}/lora-node.${triple}.node"
            if [ ! -f "$bin" ]; then
              echo "::error::missing $bin"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "--- npm/ tree ---"
            find npm -type f | sort
            exit 1
          fi

      - name: Inject optionalDependencies into root package.json
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const triples = ['linux-x64-gnu', 'linux-arm64-gnu', 'darwin-x64', 'darwin-arm64', 'win32-x64-msvc'];
          pkg.optionalDependencies = Object.fromEntries(
            triples.map((t) => [`@loradb/lora-node-${t}`, pkg.version])
          );
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log('optionalDependencies:', pkg.optionalDependencies);
          EOF

      - name: Publish each platform subpackage
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for dir in npm/*/; do
            echo "::group::publish ${dir}"
            (cd "${dir}" && npm publish --provenance --access public --ignore-scripts)
            echo "::endgroup::"
          done

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --ignore-scripts

  # ──────────────────────────────────────────────────────────────────────
  # lora-python
  # abi3-py38 means ONE wheel per (os, arch) covers every Python 3.8+
  # interpreter — we deliberately do NOT put Python versions in the
  # matrix here (that would produce identical wheel filenames and either
  # collide on upload or waste CI time). The standard lora-python CI
  # workflow is what exercises multiple interpreter versions.
  # ──────────────────────────────────────────────────────────────────────

  build-python-wheels:
    name: build wheel (${{ matrix.os }} / ${{ matrix.target }})
    needs: verify-versions
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: "auto"
          - os: ubuntu-latest
            target: aarch64
            manylinux: "auto"
          - os: macos-latest
            target: x86_64
            manylinux: "off"
          - os: macos-latest
            target: aarch64
            manylinux: "off"
          - os: windows-latest
            target: x64
            manylinux: "off"
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: ./.github/actions/copy-license
        with:
          destination: crates/lora-python

      - name: Build abi3 wheel via maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/lora-python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --interpreter python3.12
          sccache: "true"

      - name: List built wheel
        shell: bash
        run: ls -la crates/lora-python/dist

      # maturin-action runs inside a manylinux Docker container on Linux,
      # so the wheel files in dist/ (and dist/ itself) are owned by root.
      # mv needs write permission on the source directory, which the runner
      # user doesn't have until we re-own it. No-op on macOS/Windows where
      # the action runs directly on the host.
      - name: Re-own container-written dist (manylinux docker)
        if: runner.os == 'Linux'
        shell: bash
        run: sudo chown -R "$(id -u):$(id -g)" crates/lora-python/dist

      - name: Stage wheels at workspace root for clean artifact layout
        shell: bash
        run: |
          mkdir -p wheelhouse
          mv crates/lora-python/dist/*.whl wheelhouse/

      - uses: actions/upload-artifact@v5
        with:
          name: lora-python-wheel-${{ matrix.os }}-${{ matrix.target }}
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 30

  build-python-sdist:
    name: build sdist
    needs: verify-versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: ./.github/actions/copy-license
        with:
          destination: crates/lora-python

      - name: Build sdist via maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/lora-python
          command: sdist
          args: --out dist

      - name: Stage sdist at workspace root for clean artifact layout
        run: |
          mkdir -p wheelhouse
          mv crates/lora-python/dist/*.tar.gz wheelhouse/

      - uses: actions/upload-artifact@v5
        with:
          name: lora-python-sdist
          path: wheelhouse/*.tar.gz
          if-no-files-found: error
          retention-days: 30

  publish-python:
    name: publish lora-python (PyPI)
    needs: [verify-versions, build-python-wheels, build-python-sdist]
    if: needs.verify-versions.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # PyPI trusted publishers bind to an exact environment name. Keep this
    # name stable and set it in the corresponding PyPI publisher config.
    environment: pypi-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Collect wheels + sdist into dist/
        uses: actions/download-artifact@v4
        with:
          pattern: lora-python-*
          path: dist
          merge-multiple: true

      - name: List collected distributions
        shell: bash
        run: ls -lh dist

      - name: Sanity-check no duplicate dist filenames
        shell: bash
        run: |
          set -euo pipefail
          dups=$(ls dist | sort | uniq -d || true)
          if [ -n "$dups" ]; then
            echo "::error::duplicate dist filenames detected:"
            echo "$dups"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # `password` is only honoured if a trusted publisher is NOT
          # configured on PyPI for this workflow + environment. With
          # trusted publishing configured, OIDC is used and this value
          # is ignored. Leave the secret unset once trusted publishing
          # is live.
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  # ──────────────────────────────────────────────────────────────────────
  # lora-ruby
  # A source gem (always built) plus precompiled platform gems via
  # rb-sys' cross-compile harness. Platform gems let `gem install
  # lora-ruby` skip the local `cargo` build on common OS/arch pairs.
  # ──────────────────────────────────────────────────────────────────────

  build-ruby-source:
    name: build lora-ruby (source gem)
    needs: verify-versions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: crates/lora-ruby
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: lora-ruby-release-source

      - name: Set up Ruby (latest stable)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: crates/lora-ruby

      - uses: ./.github/actions/copy-license
        with:
          destination: crates/lora-ruby

      - name: Build source gem
        run: bundle exec rake build

      - name: Show built gem
        run: ls -la pkg

      - name: Stage gem at workspace root for clean artifact layout
        run: mv pkg/lora-ruby-*.gem ../../

      - uses: actions/upload-artifact@v5
        with:
          name: lora-ruby-gem-source
          path: lora-ruby-*.gem
          if-no-files-found: error
          retention-days: 30

  build-ruby-platform:
    name: build lora-ruby ${{ matrix.platform }}
    needs: verify-versions
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        # rb-sys' ruby-builder image builds every supported Ruby ABI in
        # one pass, so we only need one matrix job per platform (not per
        # Ruby version). The platforms mirror the Rakefile's
        # `ext.cross_platform` list — keep the two in lockstep.
        include:
          - platform: x86_64-linux
          - platform: aarch64-linux
          - platform: x86_64-darwin
          - platform: arm64-darwin
          - platform: x64-mingw-ucrt
    defaults:
      run:
        working-directory: crates/lora-ruby
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Ruby (host)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: crates/lora-ruby

      - uses: ./.github/actions/copy-license
        with:
          destination: crates/lora-ruby

      - name: Cross-build precompiled gem for ${{ matrix.platform }}
        # `cross-gem-action` runs inside rb-sys' official toolchain
        # image, which contains every target Ruby ABI and the Rust
        # cross-compilation toolchains pre-installed. On success it
        # writes the fat gem to pkg/lora-ruby-<version>-<platform>.gem.
        uses: oxidize-rb/actions/cross-gem@v1
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.1,3.2,3.3"
          working-directory: crates/lora-ruby
          # rb-sys-dock does not forward LANG/LC_ALL from the host, so
          # the container defaults to US-ASCII. `cargo metadata` emits
          # UTF-8 (our Cargo.toml comments/descriptions contain em-dash
          # and other multibyte chars); json 2.19's strict String#encode
          # then raises Encoding::InvalidByteSequenceError during
          # `bundle exec rake native:...`. Export a UTF-8 locale before
          # the rake invocation so the JSON parse succeeds.
          pre-script: "export LANG=C.UTF-8 LC_ALL=C.UTF-8"

      - name: Show built gem
        run: ls -la pkg

      - name: Stage gem at workspace root for clean artifact layout
        run: mv pkg/lora-ruby-*-${{ matrix.platform }}.gem ../../

      - uses: actions/upload-artifact@v5
        with:
          name: lora-ruby-gem-${{ matrix.platform }}
          path: lora-ruby-*-${{ matrix.platform }}.gem
          if-no-files-found: error
          retention-days: 30

  publish-ruby:
    name: publish lora-ruby (RubyGems)
    needs: [verify-versions, build-ruby-source, build-ruby-platform]
    if: needs.verify-versions.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # RubyGems trusted publishers bind to an exact environment name.
    # Keep this stable and set the same string in the rubygems.org
    # trusted publisher config.
    environment: rubygems-publish
    permissions:
      contents: read
      id-token: write
    # `secrets.*` is not allowed in step-level `if:` expressions, so expose
    # the optional API key via `env` and branch on `env.RUBYGEMS_API_KEY`
    # below. Empty string when the secret is unset.
    env:
      RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          # No bundler-cache — we only need the `gem` binary to push.

      - name: Download every built gem (source + platforms) into pkg/
        uses: actions/download-artifact@v4
        with:
          pattern: lora-ruby-gem-*
          path: crates/lora-ruby/pkg
          merge-multiple: true

      - name: Sanity-check collected gems
        working-directory: crates/lora-ruby
        run: |
          set -euo pipefail
          ls -la pkg
          count=$(ls pkg/lora-ruby-*.gem 2>/dev/null | wc -l | tr -d ' ')
          if [ "$count" -lt 2 ]; then
            echo "::error::expected source gem + at least one platform gem in pkg/"
            exit 1
          fi

      - name: Configure RubyGems credentials (OIDC trusted publishing)
        if: ${{ env.RUBYGEMS_API_KEY == '' }}
        # Preferred steady-state path once the `rubygems-publish`
        # environment is registered as a trusted publisher on
        # rubygems.org. See RELEASING.md for the one-time setup.
        #
        # The static-API-key fallback does NOT use this action:
        # rubygems/configure-rubygems-credentials@v1.0.0 has a default
        # `audience` input and rejects the combination with `api-token`
        # ("Cannot specify audience when using api-token"). For the
        # bootstrap path we just export GEM_HOST_API_KEY on the push
        # step below — `gem push` reads it natively.
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Push every gem to rubygems.org
        working-directory: crates/lora-ruby
        run: |
          set -euo pipefail
          # Static-token fallback: export GEM_HOST_API_KEY only when the
          # secret is actually set, so we don't clobber the credentials
          # file written by configure-rubygems-credentials on the OIDC
          # path (empty env would still take precedence over the file).
          if [ -n "${RUBYGEMS_API_KEY:-}" ]; then
            export GEM_HOST_API_KEY="${RUBYGEMS_API_KEY}"
          fi
          for gem in pkg/lora-ruby-*.gem; do
            echo "::group::push ${gem}"
            # gem push exits non-zero if the version is already
            # published; we treat "already uploaded" as success so a
            # partial-publish re-run converges without manual surgery.
            if out=$(gem push "${gem}" 2>&1); then
              echo "$out"
            else
              echo "$out"
              if echo "$out" | grep -Eqi "has already been pushed|repushing of gem versions is not allowed"; then
                echo "already published — skipping"
              else
                exit 1
              fi
            fi
            echo "::endgroup::"
          done

  # ──────────────────────────────────────────────────────────────────────
  # lora-go (github.com/lora-db/lora/crates/lora-go)
  # Go modules have no registry upload step — the module URL resolves to
  # the git tag itself. The jobs below:
  #   1. build + test the Go binding (+ the lora-ffi static lib it links)
  #      on Linux and macOS so a bad tag never lands as "green";
  #   2. package liblora_ffi as a convenience archive for downstream
  #      vendors who prefer a prebuilt artifact;
  #   3. verify proxy.golang.org has indexed the new tag once the push
  #      is live, so a resolve failure surfaces here rather than the
  #      first time a user runs `go get`.
  # All of this runs on every tag, but only step (3) requires a real
  # (non-dispatch, non-dry-run) tag push.
  # ──────────────────────────────────────────────────────────────────────

  verify-go:
    name: verify lora-go (${{ matrix.os }})
    needs: verify-versions
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    defaults:
      run:
        working-directory: crates/lora-go
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: lora-go-release-${{ matrix.os }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: crates/lora-go/go.sum

      - name: Build lora-ffi (release)
        working-directory: .
        run: cargo build --release -p lora-ffi --locked

      - name: go mod tidy (must not dirty the tree)
        shell: bash
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::go mod tidy produced diffs — commit them and re-tag"
            exit 1
          fi

      - name: gofmt -l
        shell: bash
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt drift:"
            echo "$diff"
            exit 1
          fi

      - name: go vet ./...
        run: go vet ./...

      - name: go test -race ./...
        run: go test -race ./...

  build-go-archives:
    name: package liblora_ffi (${{ matrix.triple }})
    needs: verify-versions
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            triple: linux-x64-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            triple: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            triple: darwin-arm64
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: lora-go-archive-${{ matrix.triple }}
          targets: ${{ matrix.target }}

      - name: Build lora-ffi (release) for ${{ matrix.target }}
        run: cargo build --release -p lora-ffi --locked --target ${{ matrix.target }}

      - name: Stage archive
        shell: bash
        env:
          TAG: ${{ needs.verify-versions.outputs.tag }}
          TRIPLE: ${{ matrix.triple }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          dir="lora-ffi-${TAG}-${TRIPLE}"
          mkdir -p "${dir}"
          cp "target/${TARGET}/release/liblora_ffi.a" "${dir}/"
          cp crates/lora-go/include/lora_ffi.h         "${dir}/"
          cp LICENSE README.md                          "${dir}/"
          tar -czf "${dir}.tar.gz" "${dir}"
          shasum -a 256 "${dir}.tar.gz" | awk '{print $1}' > "${dir}.tar.gz.sha256"

      - uses: actions/upload-artifact@v5
        with:
          name: lora-ffi-archive-${{ matrix.triple }}
          path: |
            lora-ffi-*.tar.gz
            lora-ffi-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

  verify-go-module-resolvable:
    name: verify go proxy serves the tag
    needs: [verify-versions, verify-go]
    if: needs.verify-versions.outputs.dry_run != 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Poll proxy.golang.org for the tag
        shell: bash
        env:
          MODULE: github.com/lora-db/lora/crates/lora-go
          TAG: ${{ needs.verify-versions.outputs.tag }}
          GOPROXY: https://proxy.golang.org
          GOFLAGS: -mod=mod
        run: |
          set -euo pipefail
          # proxy.golang.org usually indexes a new tag within ~1 minute,
          # but we allow up to ~5. Poll in 30s increments; stop as soon
          # as `go list -m` resolves.
          for i in $(seq 1 10); do
            if go list -m "${MODULE}@${TAG}"; then
              echo "proxy.golang.org resolved ${MODULE}@${TAG}"
              exit 0
            fi
            echo "attempt ${i}: not yet indexed; sleeping 30s"
            sleep 30
          done
          echo "::error::${MODULE}@${TAG} was not indexed by proxy.golang.org within 5 minutes"
          echo "manual retry: GOPROXY=direct go get ${MODULE}@${TAG}"
          exit 1

  # ──────────────────────────────────────────────────────────────────────
  # Final gate. Fails if any dependency failed or (when not a dry-run) if
  # any publish step didn't succeed. Makes branch protection / release
  # checklists easy: just require this single job.
  # ──────────────────────────────────────────────────────────────────────
  summary:
    name: packages-release summary
    needs:
      - verify-versions
      - build-wasm
      - build-node
      - build-python-wheels
      - build-python-sdist
      - build-ruby-source
      - build-ruby-platform
      - publish-wasm
      - publish-node
      - publish-python
      - publish-ruby
      - verify-go
      - build-go-archives
      - verify-go-module-resolvable
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize
        shell: bash
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          DRY: ${{ needs.verify-versions.outputs.dry_run }}
        run: |
          set -euo pipefail
          echo "dry_run=${DRY}"
          echo "$NEEDS_JSON"
          # Fail on any hard failure/cancellation upstream.
          if echo "$NEEDS_JSON" | grep -Eq '"result"[[:space:]]*:[[:space:]]*"(failure|cancelled)"'; then
            echo "::error::one or more upstream jobs failed or were cancelled"
            exit 1
          fi
          # In non-dry-run mode, publish jobs must have succeeded.
          if [ "$DRY" != "true" ]; then
            for pub in publish-wasm publish-node publish-python publish-ruby; do
              result=$(echo "$NEEDS_JSON" | node -e "const j=JSON.parse(require('fs').readFileSync(0,'utf8')); console.log(j['$pub'].result)")
              if [ "$result" != "success" ]; then
                echo "::error::${pub} did not succeed (result=${result})"
                exit 1
              fi
            done
          fi
          echo "all good"
