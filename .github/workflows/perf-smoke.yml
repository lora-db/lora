name: perf-smoke

# Performance-regression smoke benchmark.
#
# Purpose:
#   Catch obvious, large regressions in core engine paths — scan, filter,
#   traversal, write, plus the WAL durability profiles — before they land
#   on `main`. Each bench in `perf_smoke_baseline.json` carries an explicit
#   `threshold` multiplier (3× for low-variance in-memory paths, 5× for
#   sub-µs and WAL-backed paths). This is NOT a source of truth for
#   performance numbers; it's a canary. See `docs/performance/perf-smoke.md`
#   for scope and limits. For authoritative numbers use the manual
#   `benchmarks` workflow against a tagged release.
#
# Trigger:
#   - PR + push to `main`, path-filtered to code that can plausibly move
#     engine performance.
#   - Manual dispatch for ad-hoc runs.
#   - Every successful benchmark run uploads a JSON summary of the current
#     performance canary state next to the raw bencher log.
#
# Kept separate from `workspace-quality` because:
#   - bench builds use a different profile (release) and cache partition
#   - a failure here reads as "perf canary died", not "tests/clippy broke"

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/lora-database/benches/perf_smoke.rs"
      - "crates/lora-database/benches/perf_smoke_baseline.json"
      - "scripts/check-perf-smoke.mjs"
      - "scripts/summarize-benchmarks.mjs"
      - ".github/actions/setup-rust/**"
      - ".github/workflows/perf-smoke.yml"
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/lora-database/benches/perf_smoke.rs"
      - "crates/lora-database/benches/perf_smoke_baseline.json"
      - "scripts/check-perf-smoke.mjs"
      - "scripts/summarize-benchmarks.mjs"
      - ".github/actions/setup-rust/**"
      - ".github/workflows/perf-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke:
    name: perf smoke (per-bench regression gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: perf-smoke

      - name: Run perf_smoke
        shell: bash
        run: |
          set -o pipefail
          mkdir -p perf-smoke-out
          cargo bench --locked -p lora-database --bench perf_smoke \
              -- --output-format bencher \
            | tee perf-smoke-out/bencher.log

      - name: Generate benchmark JSON summary
        shell: bash
        run: |
          node scripts/summarize-benchmarks.mjs \
            --input perf-smoke-out/bencher.log \
            --output perf-smoke-out/benchmark-summary.json \
            --baseline crates/lora-database/benches/perf_smoke_baseline.json \
            --suite perf-smoke

      - name: Check against baseline
        id: check
        shell: bash
        run: |
          node scripts/check-perf-smoke.mjs --input perf-smoke-out/bencher.log \
            | tee perf-smoke-out/regression-report.txt

      # Always render the per-bench table to the run's step summary, even
      # when the previous step exited non-zero, so reviewers can see exactly
      # which benches regressed without opening the raw log.
      - name: Append regression table to step summary
        if: always()
        shell: bash
        run: |
          node scripts/check-perf-smoke.mjs \
              --input perf-smoke-out/bencher.log \
              --format markdown \
            >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: perf-smoke-benchmark-summary
          path: |
            perf-smoke-out/bencher.log
            perf-smoke-out/benchmark-summary.json
            perf-smoke-out/regression-report.txt
          if-no-files-found: warn
          retention-days: 14
