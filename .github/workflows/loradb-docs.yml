name: loradb-docs

# Docusaurus site under `apps/loradb.com` published to Cloudflare Pages at
# https://loradb.com (custom apex domain attached to the `loradb-docs`
# project in the Cloudflare Pages dashboard).
#
# Deploy policy:
#   - Tag push matching `v[0-9]+.[0-9]+.[0-9]+` (incl. pre-releases) → build + deploy.
#   - `release.released`                                              → build + deploy
#     (keeps the docs site in sync with tagged releases after the draft
#     in .github/workflows/release.yml is published).
#   - `workflow_dispatch`                                             → build + deploy
#     (manual rebuild / recovery).
#   - PR                                                              → build only
#     (verify the site still builds; artefact uploaded for inspection, no deploy).
#   - Push to `main`                                                  → NOT TRIGGERED.
#     Docs only go live on a versioned release. For doc-only updates
#     without a code release, cut a patch tag or use workflow_dispatch.
#
# Secrets required for deploy (configure under repo Settings → Secrets):
#   CLOUDFLARE_API_TOKEN  — token scoped to "Pages — Edit"
#   CLOUDFLARE_ACCOUNT_ID — found in the Cloudflare dashboard sidebar
# The deploy job fails fast with a clear message if either is missing.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  pull_request:
    paths:
      - "apps/loradb.com/**"
      - "packages/lora-query/**"
      - ".github/workflows/loradb-docs.yml"
  release:
    types: [released]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  # Serialise deploys across ref boundaries (release + dispatch + tag push
  # can't race each other) but let PR validation runs cancel stale builds
  # of themselves.
  group: loradb-docs-${{ github.event_name == 'pull_request' && github.ref || 'deploy' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/loradb.com
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: loradb-docs-ubuntu
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.14.0"

      - uses: ./.github/actions/setup-node-yarn
        with:
          node-version: "20"

      - name: yarn install (immutable)
        working-directory: .
        run: corepack yarn install --immutable

      - name: Build @loradb/lora-query
        run: corepack yarn workspace @loradb/lora-query build

      - name: Build site
        run: corepack yarn run build

      - name: Verify SEO artefacts are in build output
        # robots.txt is copied from static/, sitemap.xml is generated by
        # @docusaurus/plugin-sitemap. Fail the build if either is missing
        # so a silent SEO regression never reaches production.
        run: |
          test -f build/robots.txt
          test -f build/sitemap.xml
          grep -q 'https://loradb.com/sitemap.xml' build/robots.txt
          grep -q 'https://loradb.com/' build/sitemap.xml

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: loradb-docs-build-${{ github.sha }}
          path: apps/loradb.com/build
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: deploy
    # Never deploy from PR runs — they lack Cloudflare secrets and would
    # leak a preview URL outside the controlled production environment.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://loradb.com
    steps:
      - name: Verify Cloudflare secrets are configured
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          if [[ -z "${CF_API_TOKEN}" ]]; then
            echo "::error::Missing repo secret CLOUDFLARE_API_TOKEN."
            missing=1
          fi
          if [[ -z "${CF_ACCOUNT_ID}" ]]; then
            echo "::error::Missing repo secret CLOUDFLARE_ACCOUNT_ID."
            missing=1
          fi
          if [[ "${missing}" != "0" ]]; then
            exit 1
          fi

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: loradb-docs-build-${{ github.sha }}
          path: build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name=loradb-docs --branch=main
