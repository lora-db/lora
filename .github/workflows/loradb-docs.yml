name: loradb-docs

# Docusaurus site under `apps/loradb.com` published to GitHub Pages at
# https://loradb.com (custom apex domain, CNAME committed in static/).
#
# Deploy policy:
#   - Push to `main` (apps/loradb.com/** paths) → build + deploy.
#   - `release.released` → build + deploy (keeps Pages in sync with tagged
#     releases after the draft in .github/workflows/release.yml is published).
#   - `workflow_dispatch` → build + deploy (manual rebuild / recovery).
#   - PR → build only (verify the site still builds; artefact uploaded for
#     inspection, no deploy).

on:
  push:
    branches: [main]
    paths:
      - "apps/loradb.com/**"
      - ".github/workflows/loradb-docs.yml"
  pull_request:
    paths:
      - "apps/loradb.com/**"
      - ".github/workflows/loradb-docs.yml"
  release:
    types: [released]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Serialise Pages deploys across ref boundaries (release + dispatch can't
  # race each other) but let PR validation runs cancel stale builds of
  # themselves.
  group: pages-${{ github.event_name == 'pull_request' && github.ref || 'deploy' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: apps/loradb.com

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/loradb.com/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build site
        run: npm run build

      - name: Verify CNAME is in build output
        run: test -f build/CNAME && grep -qx loradb.com build/CNAME

      - name: Configure Pages
        if: github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/loradb.com/build

      - name: Upload build artifact (PR inspection)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          name: loradb-docs-build-${{ github.sha }}
          path: apps/loradb.com/build
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: deploy
    # Deploys on push to main, published GitHub Release, or manual dispatch.
    # PRs never deploy — they hit the `build` job only.
    if: github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
