name: lora-docs

# Build the Docusaurus site in `apps/loradb.com` and deploy it to GitHub Pages
# at https://loradb.com (custom apex domain, CNAME committed in static/).

on:
  push:
    branches: [main]
    paths:
      - "apps/loradb.com/**"
      - "lora-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: apps/loradb.com

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/loradb.com/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build site
        run: npm run build

      - name: Verify CNAME is in build output
        run: test -f build/CNAME && grep -qx loradb.com build/CNAME

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/loradb.com/build

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
