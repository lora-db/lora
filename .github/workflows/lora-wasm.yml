name: lora-wasm

on:
  push:
    branches: [main]
    paths:
      - "crates/bindings/lora-wasm/**"
      - "crates/bindings/lora-binding-buffer/**"
      - "crates/lora-ast/**"
      - "crates/lora-parser/**"
      - "crates/lora-analyzer/**"
      - "crates/lora-compiler/**"
      - "crates/lora-executor/**"
      - "crates/lora-store/**"
      - "crates/lora-database/**"
      - "crates/bindings/shared-ts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/actions/setup-rust/**"
      - ".github/workflows/lora-wasm.yml"
  pull_request:
    paths:
      - "crates/bindings/lora-wasm/**"
      - "crates/bindings/lora-binding-buffer/**"
      - "crates/lora-ast/**"
      - "crates/lora-parser/**"
      - "crates/lora-analyzer/**"
      - "crates/lora-compiler/**"
      - "crates/lora-executor/**"
      - "crates/lora-store/**"
      - "crates/lora-database/**"
      - "crates/bindings/shared-ts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/actions/setup-rust/**"
      - ".github/workflows/lora-wasm.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: crates/bindings/lora-wasm

jobs:
  verify:
    name: build, typecheck, test, npm pack
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: lora-wasm-ubuntu
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.14.0"

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "yarn"

      - name: cargo check (host)
        working-directory: .
        run: cargo check --workspace --exclude lora-node --locked

      - name: cargo check (wasm32)
        working-directory: .
        run: cargo check -p lora-wasm --target wasm32-unknown-unknown --locked

      - name: Enable corepack (yarn v4)
        working-directory: .
        run: corepack enable

      - name: yarn install (immutable)
        working-directory: .
        run: yarn install --immutable

      - name: verify shared TS types are in sync
        run: yarn run verify:types

      - name: build WASM (node + bundler + web)
        run: yarn run build:wasm

      - name: build TS
        run: yarn run build:ts

      - name: typecheck (tests, examples, configs)
        run: yarn run typecheck

      - name: vitest
        run: yarn run test

      - name: install Playwright browsers
        run: yarn exec playwright -- install --with-deps chromium

      - name: Playwright browser smoke test
        run: yarn run test:browser

      - name: npm pack (dry-run)
        run: npm pack --dry-run

      - name: npm pack (produce tarball)
        run: npm pack

      - uses: actions/upload-artifact@v5
        with:
          name: lora-wasm-tarball
          path: crates/bindings/lora-wasm/loradb-lora-wasm-*.tgz
          if-no-files-found: error
          retention-days: 7
