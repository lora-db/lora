# Yarn v4 (Berry) configuration.
#
# We use the classic node_modules linker — every workspace keeps the same
# resolution semantics as npm, and the existing scripts in apps/* and
# crates/bindings/* keep working without any PnP-specific shims.
nodeLinker: node-modules

# Speed up `yarn install` on cold caches and CI; reuse the project-local
# cache instead of stashing copies in the user-global folder.
enableGlobalCache: false

# Match the existing npm registry used by lora-wasm / lora-node publishing.
npmRegistryServer: "https://registry.npmjs.org/"
